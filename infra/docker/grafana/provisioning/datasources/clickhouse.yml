apiVersion: 1

datasources:
  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    isDefault: true
    jsonData:
      defaultDatabase: crypto
      host: clickhouse
      port: 8123
      protocol: http
      secure: false
      server: clickhouse
      username: default
    secureJsonData:
      password: ""
