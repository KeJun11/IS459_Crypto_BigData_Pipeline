x-airflow-common:
  &airflow-common
  image: apache/airflow:2.10.5-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    BATCH_S3_BUCKET: ${BATCH_S3_BUCKET:-}
    BATCH_S3_PREFIX: ${BATCH_S3_PREFIX:-bronze/rest/binance-klines}
    AIRFLOW_BRONZE_REST_PREFIX: ${AIRFLOW_BRONZE_REST_PREFIX:-}
    AIRFLOW_SILVER_REST_PREFIX: ${AIRFLOW_SILVER_REST_PREFIX:-}
    AIRFLOW_AWS_CONN_ID: ${AIRFLOW_AWS_CONN_ID:-aws_default}
    AIRFLOW_EMR_SERVERLESS_APPLICATION_ID: ${AIRFLOW_EMR_SERVERLESS_APPLICATION_ID:-}
    AIRFLOW_EMR_SERVERLESS_EXECUTION_ROLE_ARN: ${AIRFLOW_EMR_SERVERLESS_EXECUTION_ROLE_ARN:-}
    AIRFLOW_EMR_SERVERLESS_LOG_URI: ${AIRFLOW_EMR_SERVERLESS_LOG_URI:-}
    AIRFLOW_BRONZE_TO_SILVER_ENTRYPOINT: ${AIRFLOW_BRONZE_TO_SILVER_ENTRYPOINT:-s3://replace-me/jobs/bronze_to_silver_batch.py}
    AIRFLOW_SILVER_TO_GOLD_ENTRYPOINT: ${AIRFLOW_SILVER_TO_GOLD_ENTRYPOINT:-s3://replace-me/jobs/silver_to_gold_batch.py}
    AIRFLOW_EMR_PY_FILES: ${AIRFLOW_EMR_PY_FILES:-}
    AIRFLOW_EMR_SPARK_SUBMIT_PARAMETERS: ${AIRFLOW_EMR_SPARK_SUBMIT_PARAMETERS:---conf spark.dynamicAllocation.enabled=false --conf spark.executor.instances=1 --conf spark.executor.cores=1 --conf spark.executor.memory=2g --conf spark.driver.cores=1 --conf spark.driver.memory=1g}
    AIRFLOW_CLICKHOUSE_URL: ${AIRFLOW_CLICKHOUSE_URL:-}
    AIRFLOW_CLICKHOUSE_VALIDATION_URL: ${AIRFLOW_CLICKHOUSE_VALIDATION_URL:-}
    AIRFLOW_CLICKHOUSE_DATABASE: ${AIRFLOW_CLICKHOUSE_DATABASE:-crypto}
    AIRFLOW_TRACKED_SYMBOLS: ${AIRFLOW_TRACKED_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT}
    AIRFLOW_BATCH_SKIP_CLICKHOUSE: ${AIRFLOW_BATCH_SKIP_CLICKHOUSE:-false}
    KINESIS_STREAM_NAME: ${KINESIS_STREAM_NAME:-crypto-ohlcv-1m}
    STREAM_SPARK_CONTAINER: ${STREAM_SPARK_CONTAINER:-crypto-spark-master}
    STREAM_SPARK_MASTER: ${STREAM_SPARK_MASTER:-spark://spark-master:7077}
    STREAM_SPARK_PACKAGES: ${STREAM_SPARK_PACKAGES:-}
    STREAM_EXTRA_JARS: ${STREAM_EXTRA_JARS:-}
    STREAM_MAX_RUNTIME_SECONDS: ${STREAM_MAX_RUNTIME_SECONDS:-3600}
    STREAM_AWAIT_TERMINATION_SECONDS: ${STREAM_AWAIT_TERMINATION_SECONDS:-3600}
    AIRFLOW_PROJECT_ROOT: /opt/airflow/project
    _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-amazon boto3 websockets python-dotenv
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/project/src
    - ./scripts:/opt/airflow/project/scripts
    - ./schemas:/opt/airflow/project/schemas
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: crypto-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: crypto
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/clickhouse:/docker-entrypoint-initdb.d
      - ./infra/docker/clickhouse/users.d/refreshable-materialized-view.xml:/etc/clickhouse-server/users.d/refreshable-materialized-view.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    mem_limit: 4g

  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: crypto-spark-master
    ports:
      - "7077:7077"
      - "8085:8080"
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_DAEMON_MEMORY: 1g
      SPARK_MASTER_OPTS: -Dspark.deploy.defaultCores=2
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      KINESIS_STREAM_NAME: ${KINESIS_STREAM_NAME:-crypto-ohlcv-1m}
      STREAM_CHECKPOINT_ROOT: ${STREAM_CHECKPOINT_ROOT:-s3a://is459-crypto-datalake/checkpoints/stream_to_silver}
      STREAM_SILVER_OUTPUT: ${STREAM_SILVER_OUTPUT:-s3a://is459-crypto-datalake/silver/stream}
      STREAM_CLICKHOUSE_URL: ${STREAM_CLICKHOUSE_URL:-http://clickhouse:8123}
      STREAM_CLICKHOUSE_DATABASE: ${STREAM_CLICKHOUSE_DATABASE:-}
      STREAM_TRIGGER_PROCESSING_TIME: ${STREAM_TRIGGER_PROCESSING_TIME:-30 seconds}
      STREAM_INITIAL_POSITION: ${STREAM_INITIAL_POSITION:-latest}
      STREAM_KINESIS_ENDPOINT_URL: ${STREAM_KINESIS_ENDPOINT_URL:-}
      STREAM_KINESIS_FORMAT: ${STREAM_KINESIS_FORMAT:-kinesis}
    volumes:
      - ./src:/opt/project/src
      - ./schemas:/opt/project/schemas
      - ./infra/docker/spark/conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    mem_limit: 3g

  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: crypto-spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 4
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      KINESIS_STREAM_NAME: ${KINESIS_STREAM_NAME:-crypto-ohlcv-1m}
      STREAM_CHECKPOINT_ROOT: ${STREAM_CHECKPOINT_ROOT:-s3a://is459-crypto-datalake/checkpoints/stream_to_silver}
      STREAM_SILVER_OUTPUT: ${STREAM_SILVER_OUTPUT:-s3a://is459-crypto-datalake/silver/stream}
      STREAM_CLICKHOUSE_URL: ${STREAM_CLICKHOUSE_URL:-http://clickhouse:8123}
      STREAM_CLICKHOUSE_DATABASE: ${STREAM_CLICKHOUSE_DATABASE:-}
      STREAM_TRIGGER_PROCESSING_TIME: ${STREAM_TRIGGER_PROCESSING_TIME:-30 seconds}
      STREAM_INITIAL_POSITION: ${STREAM_INITIAL_POSITION:-latest}
      STREAM_KINESIS_ENDPOINT_URL: ${STREAM_KINESIS_ENDPOINT_URL:-}
      STREAM_KINESIS_FORMAT: ${STREAM_KINESIS_FORMAT:-kinesis}
    volumes:
      - ./src:/opt/project/src
      - ./schemas:/opt/project/schemas
      - ./infra/docker/spark/conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    mem_limit: 5g

  grafana:
    image: grafana/grafana:11.1.0
    container_name: crypto-grafana
    depends_on:
      - clickhouse
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      SHARED_CLICKHOUSE_HOST: ${SHARED_CLICKHOUSE_HOST}
      SHARED_CLICKHOUSE_PORT: ${SHARED_CLICKHOUSE_PORT:-8123}
      SHARED_CLICKHOUSE_DATABASE: ${SHARED_CLICKHOUSE_DATABASE}
      SHARED_CLICKHOUSE_USER: ${SHARED_CLICKHOUSE_USER:-default}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards
    mem_limit: 512m

  airflow-postgres:
    image: postgres:16
    container_name: crypto-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  airflow-init:
    <<: *airflow-common
    container_name: crypto-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --role Admin \
          --username admin \
          --password admin \
          --firstname Airflow \
          --lastname Admin \
          --email admin@example.com || true
    restart: "no"
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: crypto-airflow-webserver
    command: webserver
    ports:
      - "8088:8080"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 1g

  airflow-scheduler:
    <<: *airflow-common
    container_name: crypto-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 1g

volumes:
  clickhouse_data:
  grafana_data:
  airflow_postgres_data:
  airflow_logs:
